<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My First CSS Example</title>

<style>
    body{
        margin:0;
        background-color:#b7d8e5; /* สีพื้นหลัง */
        font-family: Arial, sans-serif;
    }

    /* หัวข้อด้านบนตรงกลาง */
    .header{
        text-align:center;
        color:white;
        font-size:56px;
        font-weight:bold;
        margin-top:30px;
    }

    /* เนื้อหาด้านซ้าย */
    .content{
        margin-left:20px;
        margin-top:40px;
    }

    .content h1{
        font-size:48px;
        margin-bottom:30px;
    }

    .content h2{
        font-size:36px;
        margin-bottom:30px;
    }

    .content p{
        font-size:32px;
    }
</style>

</head>
<body>

    <div class="header">
        My First CSS Example
    </div>

    <div class="content">
        <h1>My First CSS Example</h1>
        <h2>My First CSS Example</h2>
        <p>This is a paragraph.</p>
    </div>

</body>
</html>
